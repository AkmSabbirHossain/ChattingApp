<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRoom</title>
  <script defer src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="JS/client.js"></script>

  <!-- Emoji picker CDN -->
  <link href="https://unpkg.com/emoji-mart@latest/css/emoji-mart.css" rel="stylesheet">
  <script src="https://unpkg.com/emoji-mart@latest/dist/emoji-mart.js"></script>
</head>
<body>
  <div>
    <header>
      <h1 class="chattapps">Sabbir ChatRoom</h1>
    </header>
  </div>

  <div class="chat-box">
    <div class="container"></div>

    <!-- Custom Delete Menu -->
    <div id="deleteMenu" class="custom-menu delete-menu">
      <div onclick="deleteSelectedMessage()" class="menu-item">🗑️ Delete for Everyone</div>
    </div>

    <!-- Custom Image Menu -->
    <div id="imageMenu" class="custom-menu image-menu">
      <div id="downloadOption" class="menu-item">⬇️ Download Image</div>
      <div id="deleteImageOption" class="menu-item">🗑️ Delete for Everyone</div>
    </div>

    <form class="input-area" id="messageForm">
      <input type="hidden" name="name" id="hiddenName" value="">
      
      <!-- Emoji button -->
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Type a message here..." autocomplete="off" />
        <button type="button" id="emojiBtn" class="emoji-button">😀</button>
      </div>

      <label for="fileInput">
        <img src="File_Logo.jpg" alt="Upload" class="icon-btn">
      </label>
      <input type="file" id="fileInput" hidden />
      
      <button type="submit" id="sendBtn">
        <img src="send_button.png" alt="Send" class="icon-btn" />
      </button>
    </form>
  </div>
</body>
</html>
