<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRoom</title>
  <script defer src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="JS/client.js"></script>
  <link href="https://unpkg.com/emoji-mart@latest/css/emoji-mart.css" rel="stylesheet">
  <script src="https://unpkg.com/emoji-mart@latest/dist/emoji-mart.js"></script>
</head>
<body>

  <!-- ===== Navbar ===== -->
  <header class="chat-navbar">
    <div class="nav-left">
      <div class="nav-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
        </svg>
      </div>
      <div class="nav-info">
        <span class="nav-title">Sabbir ChatRoom</span>
        <span class="nav-status"><span class="status-dot"></span> Online</span>
      </div>
    </div>
    <div class="nav-right">
      <button class="clear-chat-btn" id="clearChatBtn" title="Clear Chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M3 6H5H21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M19 6L18.1 19.1C18 20.2 17.1 21 16 21H8C6.9 21 6 20.2 5.9 19.1L5 6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M10 11V17M14 11V17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M9 6V4C9 3.4 9.4 3 10 3H14C14.6 3 15 3.4 15 4V6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="clear-text">Clear</span>
      </button>
    </div>
  </header>

  <!-- ===== Chat Box ===== -->
  <div class="chat-box">
    <div class="container"></div>

    <!-- Delete Menu -->
    <div id="deleteMenu" class="custom-menu delete-menu">
      <div onclick="deleteSelectedMessage()" class="menu-item">🗑️ Delete for Everyone</div>
    </div>

    <!-- Image Menu -->
    <div id="imageMenu" class="custom-menu image-menu">
      <div id="downloadOption" class="menu-item download-item">⬇️ Download Image</div>
      <div id="deleteImageOption" class="menu-item delete-item" style="display:none;">🗑️ Delete for Everyone</div>
    </div>

    <!-- ===== Input Area ===== -->
    <form class="input-area" id="messageForm">
      <input type="hidden" name="name" id="hiddenName" value="">

      <button type="button" id="emojiBtn" class="emoji-button" title="Emoji">😀</button>

      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" />

      <label for="fileInput" class="icon-label" title="Attach File">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M21.44 11.05L12.25 20.24C10.06 22.43 6.51 22.43 4.32 20.24C2.13 18.05 2.13 14.5 4.32 12.31L13.51 3.12C14.99 1.64 17.37 1.64 18.85 3.12C20.33 4.6 20.33 6.98 18.85 8.46L9.65 17.65C8.87 18.43 7.6 18.43 6.82 17.65C6.04 16.87 6.04 15.6 6.82 14.82L15.07 6.57" stroke="#7157e6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </label>
      <input type="file" id="fileInput" hidden />

      <button type="submit" id="sendBtn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </div>

</body>
</html>
